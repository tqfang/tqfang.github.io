name: Update Google Scholar Citations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GOOGLE_SCHOLAR_ID: Tb3rc34AAAAJ
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate citation data
        run: |
          cd google_scholar_crawler
          pip install -r requirements.txt
          python main.py

      - name: Publish badge data branch
        run: |
          cd google_scholar_crawler/results
          git init
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add *.json
          git commit -m "Update citation data"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:google-scholar-stats --force
